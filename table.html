<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Table</title>
        <style>
            table {
                border: 1px solid rgb(114, 91, 91);
                border-collapse: collapse;
            }
            td, th {
                border: 1px solid rgb(0, 0, 0);
            }
        </style>
    </head>
    <body>
        <table>
            <thead>
                <tr>
                    <th>Ocean</th>
                    <th>Average Depth</th>
                    <th>Maximum Depth</th>
                    <th>Just for learning Git</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Pacific Ocean</td>
                    <td>4,280m</td>
                    <td>10,911m</td>
                </tr>
                <tr>
                    <td>Atlantic OCean</td>
                    <td>3,646 m</td>
                    <td>8,486 m</td>

                </tr>
            </tbody>
        </table>
    </body>
</html>
